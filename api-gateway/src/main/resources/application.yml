server:
  port: 8080
spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://${CONFIG_HOST:localhost}:8888
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "http://localhost:5173"
                allowed-methods: "*"
                allowed-headers: "*"
          routes:
            - id: user-service
              uri: lb://user-service
              predicates: [ "Path=/api/auth/**,/api/users/**" ]
            - id: restaurant-service
              uri: lb://restaurant-service
              predicates: [ "Path=/api/restaurants/**" ]
            - id: order-service
              uri: lb://order-service
              predicates: [ "Path=/api/orders/**" ]
            - id: delivery-service
              uri: lb://delivery-service
              predicates: [ "Path=/api/deliveries/**,/ws/**" ]
jwt:
  secret: ${JWT_SECRET:change-me-in-config-server-32-bytes-min!!}